name: Dien May Xanh Login Test - CI/CD

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    # Step 1: Checkout code
    - name: Checkout code
      uses: actions/checkout@v4
      
    # Step 2: Set up JDK
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    # Step 3: Install Chrome Browser
    - name: Install Chrome Browser
      run: |
        sudo apt-get update
        sudo apt-get install -y wget gnupg
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        
    # Step 4: Verify Maven installation
    - name: Verify Maven installation
      run: mvn --version
      
    # Step 5: Clean and install dependencies
    - name: Install dependencies
      run: mvn clean install -DskipTests
      
    # Step 6: Run tests in headless mode
    - name: Run tests
      run: mvn test -Dheadless=true
      continue-on-error: true  # Continue even if some tests fail
      
    # Step 7: Upload test reports
    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      if: always()  # Upload reports even if tests fail
      with:
        name: test-reports
        path: |
          target/surefire-reports/
          test-output/
        retention-days: 30
        
    # Step 8: Publish Test Results
    - name: Publish Test Results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: TestNG Results
        path: target/surefire-reports/TEST-*.xml
        reporter: java-junit
        fail-on-error: false
        
    # Step 9: Display Test Summary
    - name: Test Summary
      if: always()
      run: |
        echo "=========================================="
        echo "Test Execution Summary"
        echo "=========================================="
        if [ -f target/surefire-reports/testng-results.xml ]; then
          echo "TestNG results file found"
          cat target/surefire-reports/testng-results.xml
        else
          echo "No TestNG results file found"
        fi
        echo "=========================================="
        echo "Check the artifacts for detailed reports"
        echo "=========================================="
